<!DOCTYPE html>
<html lang="en-us">
<head>
	<title>Ruida Zeng</title>
	<meta charset="utf-8">
	<script src="js/theme.js"></script>
	<script src="js/components.js"></script>
	<script>SiteComponents.academicHead({
		extraCSS: [
			'css/contact-style.css',
			'https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css',
			'https://unpkg.com/leaflet@1.9.4/dist/leaflet.css'
		],
		extraJS: [
			'<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""><\/script>'
		],
		extraStyle: '.contact-page-container { margin-top: 80px; }'
	})</script>
</head>
<body>
	<script>document.write(SiteComponents.skyCanvas())</script>
	<script>document.write(SiteComponents.academicNav('contact'))</script>

	<!-- Contact Page Content -->
	<div class="contact-page-container">
		<div class="container">
			<div style="text-align:center">
				<h2>Contact Me</h2>
				<p>Buy me a cup of <a href="https://www.buymeacoffee.com/ruida" target="_blank" rel="noopener noreferrer"><i class="fa fa-coffee"></i></a>, or leave me a message:</p>
			</div>
			<div class="row">
				<div class="column">
					<div id="map" style="width: 900px; height: 450px; max-width: 100%; max-height: 100%"></div>
					<script>
						var map = L.map('map').setView([41.82623931304847, -71.40200262550869], 14);
						const tiles = L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
							maxZoom: 18,
							attribution: '&copy; <a href="http://www.openstreetmap.org/copyright">OpenStreetMap contributors</a>'
						}).addTo(map);

						var marker = L.marker([41.82709057885313, -71.39949792902526]).addTo(map)
							.bindPopup('Department of Computer Science, Brown University Providence, RI 02912')
					</script>
				</div>
				<div class="column">
					<form action="https://formspree.io/f/mjvlynlv", method="post">
						<label for="name">Name</label>
						<input type="text" id="name" required name="name" placeholder="Your name...">
						<label for="email">Email</label>
						<input type="email" id="email" required name="email" placeholder="Your email...">
						<label for="subject">Subject</label>
						<textarea id="subject" required name="subject" placeholder="Write something..." style="height:170px"></textarea>
						<input type="submit" value="Submit">
					</form>
				</div>
			</div>
		</div>
	</div>

	<script>document.write(SiteComponents.academicFooter())</script>
</body>
</html>
